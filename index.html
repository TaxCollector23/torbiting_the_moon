<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>tor-browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Source+Serif+4:ital,wght@0,400;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--card:hsl(0 0% 7%);--border:hsl(0 0% 16%);--text:hsl(0 0% 90%);--muted:hsl(0 0% 50%)}
body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',serif;min-height:100vh}
.wrap{max-width:40rem;margin:0 auto;padding:4rem 1.5rem 6rem}

.header{margin-bottom:2.5rem;opacity:0;animation:up .5s ease forwards}
.label{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:500}
.header p{margin-top:.3rem;color:var(--muted);font-size:13px;font-style:italic}

.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.25rem;margin-bottom:1.5rem;opacity:0;animation:up .5s .1s ease forwards}

.row{display:flex;gap:.6rem}
input{flex:1;background:transparent;border:1px dashed var(--border);border-radius:3px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;padding:.5rem .7rem;outline:none;transition:border-color .15s}
input::placeholder{color:var(--muted)}
input:focus{border-color:hsl(0 0% 40%)}

.btn{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:.5rem 1.1rem;border-radius:3px;border:1px solid var(--text);background:var(--text);color:var(--bg);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:transparent;color:var(--text)}
.btn:disabled{opacity:.3;pointer-events:none}
.btn-sm{background:transparent;color:var(--muted);border-color:var(--border);font-size:10px}
.btn-sm:hover{color:var(--text);border-color:hsl(0 0% 35%)}

.bar{height:1px;background:var(--border);margin-top:.9rem;overflow:hidden;display:none}
.bar.on{display:block}
.bar::after{content:'';display:block;height:100%;width:35%;background:var(--text);animation:slide 1.1s ease-in-out infinite}

.status{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--muted);margin-top:.6rem;min-height:1.1em}
.status.err{color:hsl(0 55% 60%)}

.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;opacity:0;animation:up .5s .2s ease forwards}
.list{display:flex;flex-direction:column;gap:.4rem}

.scard{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:.9rem 1.1rem;display:flex;align-items:center;gap:.9rem;opacity:0;animation:up .3s ease forwards}
.sinfo{flex:1;min-width:0}
.surl{font-family:'Space Grotesk',sans-serif;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-family:'Space Grotesk',sans-serif;font-size:10px;color:var(--muted);margin-top:.15rem}
.sbtns{display:flex;gap:.4rem;flex-shrink:0}

.empty{padding:2rem 0;text-align:center;font-size:13px;font-style:italic;color:var(--muted)}

/* overlay */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}
.overlay.open{display:flex}
.toolbar{display:flex;align-items:center;gap:.9rem;padding:.65rem 1.1rem;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.turl{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fw{flex:1;position:relative}
iframe{width:100%;height:100%;border:none;display:block}
.boot{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;transition:opacity .4s}
.boot.hide{opacity:0;pointer-events:none}
.boot-label{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.boot-bar{width:140px;height:1px;background:var(--border);overflow:hidden}
.boot-bar::after{content:'';display:block;height:100%;width:35%;background:var(--muted);animation:slide 1.1s ease-in-out infinite}

@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="label">anonymous browser</div>
    <h1>tor-browser</h1>
    <p>Remote browser sessions routed through Tor.</p>
  </div>

  <div class="card">
    <div class="label">target url</div>
    <div class="row">
      <input type="url" id="url" placeholder="https://check.torproject.org" value="https://check.torproject.org"/>
      <button class="btn" id="launchBtn" onclick="launch()">Launch</button>
    </div>
    <div class="bar" id="bar"></div>
    <div class="status" id="status"></div>
  </div>

  <div class="sh">
    <span class="label" style="margin:0">active sessions</span>
    <span class="label" style="margin:0" id="count">0 / 10</span>
  </div>
  <div class="list" id="list">
    <div class="empty" id="empty">No sessions yet.</div>
  </div>
</div>

<!-- fullscreen overlay -->
<div class="overlay" id="overlay">
  <div class="toolbar">
    <span class="label" style="margin:0">tor-browser</span>
    <span class="turl" id="turl"></span>
    <button class="btn btn-sm" id="endBtn">End session</button>
    <button class="btn btn-sm" onclick="closeOverlay()">✕ Close</button>
  </div>
  <div class="fw">
    <div class="boot" id="boot">
      <span class="boot-label">Bootstrapping Tor circuit…</span>
      <div class="boot-bar"></div>
    </div>
    <iframe id="frame" src="about:blank"></iframe>
  </div>
</div>

<script>
const sessions = new Map();
let activeId = null;

async function launch() {
  const url = document.getElementById('url').value.trim() || 'https://check.torproject.org';
  const btn = document.getElementById('launchBtn');
  const bar = document.getElementById('bar');
  const status = document.getElementById('status');

  btn.disabled = true;
  bar.classList.add('on');
  status.className = 'status';
  status.textContent = 'Starting container…';

  try {
    const res = await fetch('/api/session', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url})
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error || 'Failed');
    status.textContent = `Session started on port ${d.port} — opening in 15s…`;
    addCard(d.id, d.port, url, d.novnc);
    setTimeout(() => open(d.id), 15000);
  } catch(e) {
    status.textContent = e.message;
    status.className = 'status err';
  } finally {
    btn.disabled = false;
    bar.classList.remove('on');
  }
}

function addCard(id, port, url, novnc) {
  document.getElementById('empty')?.remove();
  const c = document.createElement('div');
  c.className = 'scard';
  c.id = `c-${id}`;
  const short = url.replace(/^https?:\/\//,'').slice(0,50);
  c.innerHTML = `
    <div class="sinfo">
      <div class="surl">${short}</div>
      <div class="smeta">port ${port}</div>
    </div>
    <div class="sbtns">
      <button class="btn" onclick="open('${id}')">Open</button>
      <button class="btn btn-sm" onclick="end('${id}')">End</button>
    </div>`;
  document.getElementById('list').appendChild(c);
  sessions.set(id, {port, url, novnc});
  updateCount();
}

function open(id) {
  const s = sessions.get(id);
  if (!s) return;
  activeId = id;
  document.getElementById('turl').textContent = s.url;
  document.getElementById('boot').classList.remove('hide');
  document.getElementById('frame').src = s.novnc;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('endBtn').onclick = () => end(id);
  document.getElementById('frame').onload = () => {
    setTimeout(() => document.getElementById('boot').classList.add('hide'), 2000);
  };
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('frame').src = 'about:blank';
  activeId = null;
}

async function end(id) {
  try { await fetch(`/api/session/${id}`, {method:'DELETE'}); } catch(_){}
  document.getElementById(`c-${id}`)?.remove();
  sessions.delete(id);
  updateCount();
  if (activeId === id) closeOverlay();
  if (sessions.size === 0) {
    const e = document.createElement('div');
    e.className = 'empty'; e.id = 'empty'; e.textContent = 'No sessions yet.';
    document.getElementById('list').appendChild(e);
  }
}

function updateCount() {
  document.getElementById('count').textContent = `${sessions.size} / 10`;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
</script>
</body>
</html>
